format:
  html:
    grid:
      body-width: 1150px
    theme:
      dark: [cosmo, assets/theme.scss, assets/theme-dark.scss]
      light: [cosmo, assets/theme.scss, assets/theme-light.scss]
    css: assets/site.css
    include-after-body:
      - text: |
          <script src="/assets/nw-nav.js"></script>
    toc: false
    anchor-sections: false
    link-external-newwindow: true
    include-in-header:
      - text: |
          <meta name="google-site-verification" content="0ktlvQnqLH01fphPI1cDMDTuQSmCG7mHBQdovXQs2TQ">
          <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
          <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
          <link rel="manifest" href="/site.webmanifest">

execute:
  freeze: true
