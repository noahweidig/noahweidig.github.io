<script>
(function () {
  var toggle = document.getElementById('nav-toggle');
  var menu = document.getElementById('nav-menu');
  if (!toggle || !menu) return;
  var label = document.querySelector('label[for="nav-toggle"]');

  // The mobile menu is the theme's pure-CSS checkbox toggle
  // (#nav-toggle:checked ~ #nav-menu { display:block }). Two real-iOS-Safari
  // quirks kept it from closing there (while desktop / narrow-window emulation
  // behaved fine):
  //
  // 1. Unchecking from JS didn't visibly close it. In-page anchor links
  //    (/#publications, ...) don't reload the page, so the checkbox stayed
  //    checked and the menu stayed open. Setting `toggle.checked = false`
  //    updates the property, but real iOS Safari does NOT reliably re-evaluate
  //    the `:checked ~ #nav-menu` sibling selector for a display:none checkbox
  //    until some later interaction forces a repaint -- hence the "tap the item
  //    twice to close" symptom (WebKit checkbox-hack repaint bug, see
  //    twbs/bootstrap#33481). We therefore ALSO toggle the
  //    `.hb-menu-force-closed` class (custom.css) whose classList change forces
  //    the repaint immediately and whose `display:none !important` wins over the
  //    stale `:checked ~` reveal.
  // 2. Tapping outside the menu never closed it, because on iOS Safari `click`
  //    events don't bubble to `document` from non-interactive elements. We watch
  //    `touchstart` (iOS) in addition to `click` (desktop) to catch outside taps.
  function closeMenu() {
    toggle.checked = false;
    menu.classList.add('hb-menu-force-closed');
  }

  // Keep the force-closed override in sync with genuine checkbox toggles: when
  // the user re-opens the menu via the (real) hamburger label, `change` fires and
  // we drop the class so the theme's `:checked ~` reveal shows the menu normally.
  toggle.addEventListener('change', function () {
    if (toggle.checked) {
      menu.classList.remove('hb-menu-force-closed');
    } else {
      menu.classList.add('hb-menu-force-closed');
    }
  });

  // Close when a menu item is selected. Bound directly to each link (more
  // reliable on real iOS than delegating to the <ul>).
  menu.querySelectorAll('a[href]').forEach(function (link) {
    link.addEventListener('click', closeMenu);
  });

  // Close when the user taps/clicks outside the open menu. Ignore taps on the
  // menu itself and on the hamburger label/checkbox (the theme handles those).
  function onOutside(e) {
    if (!toggle.checked) return;
    var t = e.target;
    if (menu.contains(t)) return;
    if (label && label.contains(t)) return;
    if (t === toggle) return;
    closeMenu();
  }
  document.addEventListener('touchstart', onOutside, { passive: true });
  document.addEventListener('click', onOutside);
})();
</script>
