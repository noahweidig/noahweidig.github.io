name: Update Zotero Publications

on:
  schedule:
    - cron: "0 0 */14 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Zotero publications
        run: node scripts/update-pubs.js

      - name: Commit changes
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add content/publications content/authors data/authors
          git diff --cached --quiet || git commit -m "Auto-update Zotero publications"
          git push
