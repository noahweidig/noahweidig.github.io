name: Optimize Images

# Converts new/modified images under content/, assets/ and static/ to
# WebP, standardizes aspect ratio (center-crop, no padding) and caps the
# longest edge, then commits the result back. A manual run can sweep every
# existing image. HugoBlox favicons / PWA icons / site logo are excluded
# (see scripts/optimize_images.py) so the site keeps building.

on:
  push:
    branches: [main, master]
    paths:
      - 'content/**'
      - 'assets/**'
      - 'static/**'
  workflow_dispatch:
    inputs:
      process_all:
        description: 'Sweep ALL existing images (not just changed ones)'
        type: boolean
        default: true

# Tunables — override here to customize later without editing the script.
env:
  IMG_TARGET_RATIO: '16:9'
  IMG_STD_RATIOS: '16:9,4:3,1:1'
  IMG_RATIO_TOL: '0.05'
  IMG_MAX_EDGE: '1200'
  IMG_THUMB_MAX_EDGE: '800'
  IMG_QUALITY: '80'
  IMG_ROOTS: 'content,assets,static'

permissions:
  contents: write

# Never run two optimizers against the same branch at once.
concurrency:
  group: optimize-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  optimize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Need the parent commit to diff changed files on push.
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet Pillow==11.0.0 piexif==1.1.3

      - name: Collect target images
        id: collect
        env:
          PROCESS_ALL: ${{ github.event_name == 'workflow_dispatch' && inputs.process_all }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [ "${PROCESS_ALL:-false}" = "true" ]; then
            echo "mode=all (full sweep)"
            echo "args=" >> "$GITHUB_OUTPUT"   # empty -> script scans IMG_ROOTS
            echo "have_work=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push mode: only added/modified images in the tracked roots.
          if [ -z "${BEFORE_SHA:-}" ] || ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null \
             || [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            DIFF_BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          else
            DIFF_BASE="${BEFORE_SHA}"
          fi
          echo "diffing ${DIFF_BASE}..${GITHUB_SHA:-HEAD}"

          mapfile -t FILES < <(
            git diff --name-only --diff-filter=AM "${DIFF_BASE}" "${GITHUB_SHA:-HEAD}" -- \
              content assets static \
            | grep -iE '\.(png|jpe?g|webp)$' || true
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No changed images."
            echo "have_work=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'changed: %s\n' "${FILES[@]}"
          printf '%s\n' "${FILES[@]}" > /tmp/image-targets.txt
          echo "have_work=true" >> "$GITHUB_OUTPUT"

      - name: Optimize
        if: steps.collect.outputs.have_work == 'true'
        run: |
          if [ -s /tmp/image-targets.txt ]; then
            mapfile -t FILES < /tmp/image-targets.txt
            python3 scripts/optimize_images.py "${FILES[@]}"
          else
            python3 scripts/optimize_images.py
          fi

      - name: Commit & push
        if: steps.collect.outputs.have_work == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage only the image roots the optimizer touches, never unrelated files.
          git add content assets static
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "chore(images): optimize to WebP and standardize dimensions"
          for i in 1 2 3 4; do
            if git push; then
              echo "pushed"; exit 0
            fi
            echo "push failed, retrying in $((2**i))s"; sleep $((2**i))
            git pull --rebase || true
          done
          echo "::error::git push failed after retries"; exit 1
