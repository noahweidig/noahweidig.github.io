name: Deploy website to GitHub Pages

on:
  # Trigger the workflow every time you push to the `main` branch
  push:
    branches: ['main']
  # Allows you to run this workflow manually from the Actions tab on GitHub
  workflow_dispatch:

# Provide permission to clone the repo and deploy it to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # Check deployment configuration
  config:
    runs-on: ubuntu-latest
    outputs:
      deploy-host: ${{ steps.check.outputs.host }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        sparse-checkout: hugoblox.yaml
        sparse-checkout-cone-mode: false

    - name: Check deploy host
      id: check
      run: |
        # Extract deploy.host from hugoblox.yaml using pure shell (avoids unverified binary download)
        HOST=$(grep -m1 '^[[:space:]]*host:' hugoblox.yaml | sed "s/.*host:[[:space:]]*['\"]//;s/['\"][[:space:]]*$//" || true)
        HOST=${HOST:-github-pages}
        
        # Validate known hosts
        if [[ ! "$HOST" =~ ^(github-pages|netlify|vercel|cloudflare|none)$ ]]; then
          echo "::warning::Unknown deploy host '$HOST', defaulting to github-pages"
          HOST="github-pages"
        fi
        
        echo "host=$HOST" >> $GITHUB_OUTPUT
        echo "Deployment target: $HOST"

  # Build website using reusable workflow (always runs for CI)
  build:
    needs: config
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # Deploy website to GitHub Pages hosting (only if configured)
  deploy:
    needs: [config, build]
    if: needs.config.outputs.deploy-host == 'github-pages'
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
