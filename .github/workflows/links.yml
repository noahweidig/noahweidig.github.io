name: Check links

on:
  pull_request:
    branches: [main]
  schedule:
    # Monthly sweep for link rot on the 8th.
    - cron: "0 6 8 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2
        with:
          version: 1.9.38

      - name: Render site
        run: quarto render

      - name: Run lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # Check the rendered site so generated links are covered too.
          # noahweidig.com links are checked live (some are separate
          # project-pages repos, not part of this site's render).
          # Accepted codes: 403/429 (bot blocking), 405 (Formspree POST
          # endpoint), 415 (oakfirescience.com's WAF rejects the CI request
          # though the page loads 200 in a browser), 999 (LinkedIn).
          # Excluded hosts have TLS setups rustls can't negotiate.
          args: >-
            --no-progress
            --root-dir ${{ github.workspace }}/_site
            --accept '100..=103,200..=299,403,405,415,429,999'
            --exclude 'ecos\.fws\.gov'
            --exclude 'victoriamdonovan\.org'
            '_site/**/*.html'
          fail: true
